<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 226" role="img" aria-label="LLM хорошо преобразует данные внутри контекста, но для внешнего мира нужны инструменты">
<style>
.svg-label { font-family: "Helvetica", sans-serif; fill: #1a1814; font-size: 15px; font-weight: 600; }
.svg-small { font-family: "Helvetica", sans-serif; fill: #4a463e; font-size: 12px; }
.svg-mono  { font-family: "Menlo", monospace; fill: #7a7468; font-size: 11px; }
.svg-box        { fill: #f3eee2; stroke: #e3ddcc; stroke-width: 1.4; }
.svg-box.surface{ fill: #ffffff; }
.svg-box.accent { fill: #f4ddca; stroke: rgba(184,67,26,.35); }
.svg-box.green  { fill: #d8e7d8; stroke: rgba(45,94,62,.35); }
.svg-box.yellow { fill: #fcf0c0; stroke: rgba(184,136,26,.35); }
.svg-arrow      { stroke: #b8431a; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.svg-arrow.green{ stroke: #2d5e3e; }
.svg-arrow.mute { stroke: #7a7468; stroke-width: 1.6; }
.svg-dot        { fill: #b8431a; }
.svg-dot.green  { fill: #2d5e3e; }
.svg-dot.yellow { fill: #b8881a; }
</style>
      <rect class="svg-box green" x="20" y="26" width="304" height="158" rx="18" />
      <text class="svg-label" x="172" y="62" text-anchor="middle">Внутри контекста</text>
      <text class="svg-small" x="172" y="92" text-anchor="middle">перевод · рерайт · объяснение кода</text>
      <text class="svg-small" x="172" y="113" text-anchor="middle">извлечение и классификация полей</text>
      <rect x="70" y="138" width="204" height="30" rx="15" fill="#ffffff" stroke="rgba(45,94,62,0.35)" stroke-width="1.2" />
      <text class="svg-mono" x="172" y="157" text-anchor="middle" style="fill:#2d5e3e">текст → текст</text>

      <line x1="360" y1="16" x2="360" y2="196" stroke="#e3ddcc" stroke-width="2" stroke-dasharray="7 8" />
      <rect x="318" y="92" width="84" height="26" rx="13" fill="#ffffff" stroke="#e3ddcc" stroke-width="1" />
      <text class="svg-mono" x="360" y="109" text-anchor="middle">граница</text>

      <rect class="svg-box accent" x="396" y="26" width="304" height="158" rx="18" />
