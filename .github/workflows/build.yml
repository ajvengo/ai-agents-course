name: build-lesson

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Quarto + TinyTeX
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/quarto
            ~/.TinyTeX
          # Bump the v1 suffix to force-invalidate the cache.
          key: ${{ runner.os }}-quarto-tinytex-v1-${{ hashFiles('_quarto.yml', 'llm-i-agenty.qmd') }}
          restore-keys: |
            ${{ runner.os }}-quarto-tinytex-v1-

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true            # LaTeX toolchain for the PDF output

      - name: Install librsvg
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      # `quarto render` builds every format declared in _quarto.yml (html + pdf)
      - name: Render
        run: quarto render

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: llm-i-agenty-pdf
          path: _site/llm-i-agenty.pdf

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        env:
          NODE_OPTIONS: --no-deprecation
